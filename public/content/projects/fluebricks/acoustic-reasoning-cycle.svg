<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 250" fill="none">
  <style>
    .box { fill: #262626; rx: 6; }
    .label { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 15px; fill: white; text-anchor: middle; dominant-baseline: central; font-weight: 500; }
    .label-sub { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 13px; fill: #9ca3af; text-anchor: middle; dominant-baseline: central; font-weight: 400; }
    .arrow { stroke: #a3a3a3; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .arrow-curve { stroke: #a3a3a3; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#a3a3a3" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Hypothesize box -->
  <rect x="40" y="70" width="140" height="48" class="box"/>
  <text x="110" y="94" class="label">Hypothesize</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="94" x2="220" y2="94" class="arrow"/>

  <!-- Configure box -->
  <rect x="230" y="70" width="140" height="48" class="box"/>
  <text x="300" y="94" class="label">Configure</text>

  <!-- Arrow 2 -->
  <line x1="380" y1="94" x2="410" y2="94" class="arrow"/>

  <!-- Play box -->
  <rect x="420" y="70" width="110" height="48" class="box"/>
  <text x="475" y="94" class="label">Play</text>

  <!-- Arrow 3 -->
  <line x1="540" y1="94" x2="570" y2="94" class="arrow"/>

  <!-- Refine box -->
  <rect x="580" y="70" width="110" height="48" class="box"/>
  <text x="635" y="94" class="label">Refine</text>

  <!-- Revise curve arrow (from Refine back to Hypothesize) -->
  <path d="M635,128 C635,195 110,195 110,128" class="arrow-curve"/>

  <!-- iterate label -->
  <text x="372" y="200" class="label-sub">iterate</text>
</svg>
