<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" fill="none">
  <style>
    .box { fill: #262626; rx: 6; }
    .box-outline { fill: none; stroke: #262626; stroke-width: 1.5; rx: 6; }
    .label { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 15px; fill: white; text-anchor: middle; dominant-baseline: central; font-weight: 500; }
    .label-dark { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 15px; fill: #262626; text-anchor: middle; dominant-baseline: central; font-weight: 500; }
    .label-sub { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 13px; fill: #9ca3af; text-anchor: middle; dominant-baseline: central; font-weight: 400; }
    .arrow { stroke: #a3a3a3; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .arrow-curve { stroke: #a3a3a3; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .dotted { stroke: #a3a3a3; stroke-width: 1.5; stroke-dasharray: 4 4; fill: none; }
    .title { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 13px; fill: #6b7280; text-anchor: middle; dominant-baseline: central; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#a3a3a3" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- observe/target label + dotted arrow down -->
  <text x="138" y="50" class="label-sub">observe / target</text>
  <line x1="138" y1="64" x2="138" y2="100" class="dotted"/>
  <path d="M134,96 L138,104 L142,96" fill="none" stroke="#a3a3a3" stroke-width="1.5"/>

  <!-- Hypothesize box -->
  <rect x="68" y="110" width="140" height="48" class="box"/>
  <text x="138" y="134" class="label">Hypothesize</text>

  <!-- Arrow 1 -->
  <line x1="218" y1="134" x2="258" y2="134" class="arrow"/>

  <!-- Configure box -->
  <rect x="268" y="110" width="140" height="48" class="box"/>
  <text x="338" y="134" class="label">Configure</text>

  <!-- Arrow 2 -->
  <line x1="418" y1="134" x2="458" y2="134" class="arrow"/>

  <!-- Evaluate box -->
  <rect x="468" y="110" width="140" height="48" class="box"/>
  <text x="538" y="134" class="label">Evaluate</text>

  <!-- Arrow 3 -->
  <line x1="618" y1="134" x2="640" y2="134" class="arrow"/>

  <!-- Conclude box (outline) -->
  <rect x="650" y="114" width="56" height="40" class="box-outline"/>
  <text x="678" y="134" class="label-dark" font-size="12">✓</text>

  <!-- Conclude label -->
  <text x="678" y="174" class="label-sub">Conclude</text>

  <!-- Revise curve arrow (from Evaluate back to Hypothesize) -->
  <path d="M538,168 C538,230 138,230 138,168" class="arrow-curve"/>

  <!-- Revise label -->
  <text x="338" y="240" class="label-sub">revise</text>
</svg>
