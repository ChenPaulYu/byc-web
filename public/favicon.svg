<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- MPC body -->
  <rect x="1" y="3" width="30" height="26" rx="3" fill="#f3f4f6" stroke="#d4d4d4" stroke-width="0.8"/>

  <!-- 4x4 Pad grid (left side) -->
  <rect x="3" y="5.5" width="4" height="4" rx="0.6" fill="#9ca3af"/>
  <rect x="8" y="5.5" width="4" height="4" rx="0.6" fill="#9ca3af"/>
  <rect x="13" y="5.5" width="4" height="4" rx="0.6" fill="#9ca3af"/>
  <rect x="18" y="5.5" width="4" height="4" rx="0.6" fill="#9ca3af"/>

  <rect x="3" y="10.5" width="4" height="4" rx="0.6" fill="#9ca3af"/>
  <rect x="8" y="10.5" width="4" height="4" rx="0.6" fill="#9ca3af"/>
  <rect x="13" y="10.5" width="4" height="4" rx="0.6" fill="#9ca3af"/>
  <rect x="18" y="10.5" width="4" height="4" rx="0.6" fill="#9ca3af"/>

  <rect x="3" y="15.5" width="4" height="4" rx="0.6" fill="#6b7280"/>
  <rect x="8" y="15.5" width="4" height="4" rx="0.6" fill="#6b7280"/>
  <rect x="13" y="15.5" width="4" height="4" rx="0.6" fill="#6b7280"/>
  <rect x="18" y="15.5" width="4" height="4" rx="0.6" fill="#6b7280"/>

  <rect x="3" y="20.5" width="4" height="4" rx="0.6" fill="#4b5563"/>
  <rect x="8" y="20.5" width="4" height="4" rx="0.6" fill="#4b5563"/>
  <rect x="13" y="20.5" width="4" height="4" rx="0.6" fill="#4b5563"/>
  <rect x="18" y="20.5" width="4" height="4" rx="0.6" fill="#4b5563"/>

  <!-- Screen (right side) -->
  <rect x="23.5" y="5.5" width="6" height="9" rx="1" fill="#059669" opacity="0.25"/>

  <!-- Avatar on screen -->
  <circle cx="26.5" cy="8" r="1.5" fill="#2dd4bf"/>
  <line x1="26.5" y1="9.5" x2="26.5" y2="13" stroke="#2dd4bf" stroke-width="1" stroke-linecap="round"/>
  <line x1="25.2" y1="10.5" x2="27.8" y2="10.5" stroke="#2dd4bf" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Knobs (right side, below screen) -->
  <circle cx="25" cy="18" r="1.3" fill="#374151"/>
  <circle cx="28.5" cy="18" r="1.3" fill="#374151"/>
  <circle cx="25" cy="22" r="1.3" fill="#374151"/>
  <circle cx="28.5" cy="22" r="1.3" fill="#374151"/>
</svg>
