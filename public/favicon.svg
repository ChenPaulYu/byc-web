<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#f5f5f5" stroke="#d4d4d4" stroke-width="1"/>

  <!-- MPC pad grid (4x4, bottom area) -->
  <g transform="translate(4, 12)">
    <!-- Pad rows -->
    <rect x="0" y="0" width="4" height="4" rx="0.5" fill="#9ca3af"/>
    <rect x="5" y="0" width="4" height="4" rx="0.5" fill="#9ca3af"/>
    <rect x="10" y="0" width="4" height="4" rx="0.5" fill="#9ca3af"/>
    <rect x="15" y="0" width="4" height="4" rx="0.5" fill="#9ca3af"/>

    <rect x="0" y="5" width="4" height="4" rx="0.5" fill="#9ca3af"/>
    <rect x="5" y="5" width="4" height="4" rx="0.5" fill="#9ca3af"/>
    <rect x="10" y="5" width="4" height="4" rx="0.5" fill="#9ca3af"/>
    <rect x="15" y="5" width="4" height="4" rx="0.5" fill="#9ca3af"/>

    <rect x="0" y="10" width="4" height="4" rx="0.5" fill="#6b7280"/>
    <rect x="5" y="10" width="4" height="4" rx="0.5" fill="#6b7280"/>
    <rect x="10" y="10" width="4" height="4" rx="0.5" fill="#6b7280"/>
    <rect x="15" y="10" width="4" height="4" rx="0.5" fill="#6b7280"/>
  </g>

  <!-- Avatar figure (simple stick person on top of pads) -->
  <circle cx="20" cy="6" r="2.5" fill="#2dd4bf"/>
  <line x1="20" y1="8.5" x2="20" y2="13" stroke="#2dd4bf" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="10" x2="22" y2="10" stroke="#2dd4bf" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="20" y1="13" x2="18.5" y2="16" stroke="#2dd4bf" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="20" y1="13" x2="21.5" y2="16" stroke="#2dd4bf" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Waving arm -->
  <line x1="22" y1="10" x2="24" y2="7.5" stroke="#2dd4bf" stroke-width="1.2" stroke-linecap="round"/>
</svg>
